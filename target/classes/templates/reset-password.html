<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dollar Tracker - Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .reset-header h1 {
            color: #667eea;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            border-radius: 5px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-reset {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 5px;
            padding: 10px;
            width: 100%;
            color: white;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        .btn-reset:hover:not(:disabled) {
            opacity: 0.9;
        }
        .btn-reset:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .links-container {
            text-align: center;
            margin-top: 20px;
        }
        .links-container a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .links-container a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .error-text {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .success-text {
            color: #28a745;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>💰 Dollar Tracker</h1>
            <p class="text-muted">Reset Your Password</p>
        </div>

        <div id="errorMessage" class="alert alert-danger" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" maxlength="75" required>
            </div>

            <div class="form-group">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                <div class="form-text">
                    Min 8 characters, at least 1 special character (!@#$%^&*), not all same, max 2 consecutive digits
                </div>
                <div class="error-text" id="newPasswordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
                <div class="success-text" id="passwordMatch">✓ Passwords match</div>
                <div class="error-text" id="passwordMismatch">Passwords do not match</div>
            </div>

            <button type="submit" id="resetBtn" class="btn btn-reset" disabled>Reset Password</button>
        </form>

        <div class="links-container">
            <a href="/login">Back to Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const form = document.getElementById('resetForm');
        const emailInput = document.getElementById('email');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const resetBtn = document.getElementById('resetBtn');

        // Password validation
        newPasswordInput.addEventListener('input', () => {
            const error = document.getElementById('newPasswordError');
            const password = newPasswordInput.value;
            let errorMsg = '';

            if (password.length < 8) {
                errorMsg = 'Password must be at least 8 characters';
            } else if (!/[!@#$%^&*]/.test(password)) {
                errorMsg = 'Password must contain at least one special character';
            } else if (password.split('').every((c, i, a) => c === a[0])) {
                errorMsg = 'Password cannot have all same characters';
            } else if (/\d{3,}/.test(password)) {
                errorMsg = 'Password cannot have more than 2 consecutive numbers';
            }

            if (errorMsg) {
                error.textContent = errorMsg;
                error.style.display = 'block';
            } else {
                error.style.display = 'none';
            }
            validateForm();
        });

        // Confirm password validation
        confirmPasswordInput.addEventListener('input', () => {
            const match = document.getElementById('passwordMatch');
            const mismatch = document.getElementById('passwordMismatch');

            if (confirmPasswordInput.value && newPasswordInput.value === confirmPasswordInput.value) {
                match.style.display = 'block';
                mismatch.style.display = 'none';
            } else if (confirmPasswordInput.value) {
                match.style.display = 'none';
                mismatch.style.display = 'block';
            } else {
                match.style.display = 'none';
                mismatch.style.display = 'none';
            }
            validateForm();
        });

        function validateForm() {
            const isEmailValid = emailInput.value.trim() !== '';
            const isPasswordValid = !document.getElementById('newPasswordError').style.display || document.getElementById('newPasswordError').style.display === 'none';
            const isPasswordMatch = newPasswordInput.value === confirmPasswordInput.value && confirmPasswordInput.value !== '';

            resetBtn.disabled = !(isEmailValid && isPasswordValid && isPasswordMatch);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: emailInput.value,
                        newPassword: newPasswordInput.value,
                        confirmPassword: confirmPasswordInput.value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('successMessage').textContent = data.message;
                    document.getElementById('successMessage').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    document.getElementById('errorMessage').textContent = data.error;
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'An error occurred. Please try again.';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
